# ============================================================
# IMPORTANT: DO NOT commit real credentials to git!
# ============================================================
# This file contains PLACEHOLDER base64 values.
# Replace them before applying, or use the imperative approach:
#
#   kubectl create secret generic llm-secrets \
#     --from-literal=openai_api_key="$OPENAI_API_KEY" \
#     --from-literal=mlflow_tracking_uri="$MLFLOW_TRACKING_URI" \
#     --from-literal=mlflow_tracking_token="$MLFLOW_TOKEN" \
#     -n mlops --dry-run=client -o yaml | kubectl apply -f -
#
# Encode a value manually:
#   echo -n "my-secret-value" | base64
# Decode:
#   echo "bXktc2VjcmV0LXZhbHVl" | base64 --decode
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: llm-secrets
  namespace: mlops
  labels:
    app: telco-churn
type: Opaque
data:
  # Replace with: echo -n "sk-proj-YOUR_KEY" | base64
  openai_api_key: REPLACE_WITH_BASE64_ENCODED_KEY
  # Replace with: echo -n "http://mlflow:5000" | base64
  mlflow_tracking_uri: aHR0cDovL21sZmxvdzoxMjM0
  # Replace with: echo -n "your-mlflow-token" | base64
  mlflow_tracking_token: REPLACE_WITH_BASE64_ENCODED_TOKEN
